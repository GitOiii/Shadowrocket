[General]
bypass-system = true
skip-proxy = localhost, *.local, captive.apple.com
tun-excluded-routes = 10.0.0.0/8, 100.64.0.0/10, 127.0.0.0/8, 169.254.0.0/16, 172.16.0.0/12, 192.0.0.0/24, 192.0.2.0/24, 192.88.99.0/24, 192.168.0.0/16, 198.51.100.0/24, 203.0.113.0/24, 224.0.0.0/4, 255.255.255.255/32, 239.255.255.250/32
ipv6 = true
prefer-ipv6 = false
icmp-auto-reply = true
private-ip-answer = true
udp-policy-not-supported-behaviour = REJECT
dns-server = https://dns.alidns.com/dns-query, https://doh.pub/dns-query
fallback-dns-server = 223.5.5.5, 119.29.29.29
enhanced-mode-by-rule = true
dns-direct-system = false
dns-direct-fallback-proxy = true

[Proxy Group]
1 = url-test,interval=1800,tolerance=150,timeout=5,url=http://www.gstatic.com/generate_204,policy-regex-filter=鄒旨譌･|譁ｰ|闍ｱ|髻ｩ|US|USA|JP|Japan|SG|Singapore|UK|KR|宖倂宖俠|宖佟宖侗|宖俠宖佈|宖佈宖份|宖佪宖俉
2 = fallback,interval=3600,timeout=5,url=http://www.gstatic.com/generate_204,policy-regex-filter=貂ｯ|蜿ｰ|譌･|譁ｰ|髻ｩ|HK|HongKong|TW|Taiwan|JP|Japan|SG|Singapore|KR|Korea|宖佉宖佪|宖佟宖侗|宖俠宖佈|宖佪宖俉

[Rule]
